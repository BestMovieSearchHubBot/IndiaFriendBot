<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@400&display=swap" rel="stylesheet">

<style>
/* 🔴 ZOOM & SELECTION KILLER - Isse zoom aur long press band ho jayega */
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none;
  touch-action: none; 
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(5px);
  color: white;
  z-index: 10;
  position: relative;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid #ffd700;
  color: #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 180px; /* Frame ko screen ke beech mein laane ke liye */
  position: relative;
}

.machine {
  position: relative;
  width: 350px; 
  height: 350px; 
}

/* FRAME */
.frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; 
  transform: scale(1.25); 
  transform-origin: center;
}

/* 🎰 REELS AREA - Gaps and Alignment Fixed */
.reels {
  position: absolute;
  top: 36px;    
  left: -5px;    
  width: 360px; 
  height: 295px; 
  display: flex;
  justify-content: center;
  gap: 12px;    
  overflow: hidden; 
  z-index: 2;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 95px;  
  align-items: center;
  transition: transform 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
}

.reel img {
  width: 95px;  
  height: 88px; 
  object-fit: contain;
  margin-bottom: 12px; 
  display: block;
}

/* SIDEBAR */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 10px 5px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 10px;
  border: 1px solid rgba(255,255,255,0.3);
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 15px;
  border-top: 2px solid #333;
  z-index: 10;
}

.spin-btn {
  background: linear-gradient(180deg, #ffb300, #fb8c00);
  padding: 12px 50px;
  border-radius: 30px;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 0 #b35900;
}

.spin-btn:active {
  transform: scale(0.95);
  box-shadow: 0 2px 0 #b35900;
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="topbar">
  <div>👤 PLAYER</div>
  <div class="coins">💰 <span id="coins">1030</span></div>
</div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebtn">🎁 BONUS</div>
    <div class="sidebtn">500x</div>
    <div class="sidebtn">100x</div>
  </div>
</div>

<div class="controls">
  <div style="color:white">BET 1</div>
  <div class="spin-btn" onclick="spin()">SPIN</div>
</div>

<script>
// Gems ki list - Inhe apne folder ke naam se match karein
const symbols = [
  'gems/blue.png',
  'gems/red.png',
  'gems/green.png',
  'gems/yellow.png',
  'gems/purple.png'
];

// Page load hote hi gems dikhane ke liye function
function initGame() {
  for (let i = 1; i <= 3; i++) {
    const reel = document.getElementById('r' + i);
    reel.innerHTML = ''; // Purana clear karein
    for (let j = 0; j < 10; j++) { // 10 gems generate karein taaki spin animation dikhe
      const img = document.createElement('img');
      img.src = symbols[Math.floor(Math.random() * symbols.length)];
      reel.appendChild(img);
    }
  }
}

function spin() {
  // Spin sound ya logic yahan add karein
  initGame(); // Filhal bas naye gems load honge
}

// Zoom aur long press ko rokne ke liye extra security
document.addEventListener('touchstart', function (e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// Game start karein
initGame();
</script>

</body>
</html>
