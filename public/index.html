<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
/* 🔴 ZOOM & SELECTION KILLER */
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none;
  /* Zoom ko browser level par block karne ke liye */
  touch-action: none; 
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
  position: fixed; /* Screen hilne se rokne ke liye */
  width: 100%;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 250px; 
  position: relative;
}

.machine {
  position: relative;
  width: 350px; 
  height: 350px; 
}

/* FRAME */
.frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; 
  transform: scale(1.28); /* Thoda bada kiya taaki gaps cover hon */
  transform-origin: center;
}

/* 🎰 REELS AREA - GAPS & ALIGNMENT FIXED */
.reels {
  position: absolute;
  top: 38px;    /* Gems ko boxes mein center laane ke liye thoda niche kiya */
  left: 0px;    /* Side gaps fix karne ke liye zero kiya */
  width: 350px; /* Frame ki base width ke barabar */
  height: 290px; 
  display: flex;
  justify-content: center; /* Columns ko beech mein rakhega */
  gap: 15px;    /* Har line ke beech ka gap */
  overflow: hidden; 
  z-index: 2;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 92px;  /* Har gem column ki width */
  align-items: center;
}

.reel img {
  width: 92px;  
  height: 85px; 
  object-fit: contain;
  margin-bottom: 12px; /* Do gems ke beech ka vertical gap */
  display: block;
  pointer-events: none;
}

/* SIDEBAR & CONTROLS (Same as before) */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 10px 8px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 11px;
}

.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: space-around;
  padding: 15px;
  z-index: 10;
}

.spin {
  background: orange;
  padding: 12px 40px;
  border-radius: 30px;
  font-weight: bold;
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="spin" onclick="spin()">SPIN</div>
</div>

<script>
// Zoom rokne ke liye ek extra safety script
document.addEventListener('touchstart', function (event) {
  if (event.touches.length > 1) {
    event.preventDefault();
  }
}, { passive: false });

document.addEventListener('gesturestart', function (event) {
  event.preventDefault();
});
</script>
</body>
</html>
