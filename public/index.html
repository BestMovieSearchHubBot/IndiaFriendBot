<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Gems</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: 'Orbitron', sans-serif;
  background:url('bg.jpg') no-repeat center/cover;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.6);
}

.coins{
  background:#111;
  padding:5px 15px;
  border-radius:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:10px;
  justify-content:center;
  margin-top:30px;
}

/* BOX */
.box{
  width:90px;
  height:90px;
  background:linear-gradient(#ffd700,#b8860b);
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

/* GEM */
.item{
  position:absolute;
  top:-100px;
  width:100%;
  height:100%;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: top 0.5s ease;
}

.show{
  top:0;
}

/* SIDEBAR */
.sidebar{
  position:absolute;
  right:10px;
  top:100px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebtn{
  background:purple;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* CONTROLS */
.controls{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.spin{
  background:orange;
  padding:15px 30px;
  border-radius:50px;
  font-size:20px;
}

</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="sidebar">
  <div class="sidebtn">🎁 Bonus</div>
  <div class="sidebtn">500x</div>
  <div class="sidebtn">100x</div>
</div>

<div class="controls">
  <div>-</div>
  <div>BET 1</div>
  <div>+</div>
  <div class="spin" onclick="spin()">SPIN</div>
</div>

<script src="script.js"></script>

</body>
</html>
