<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

<style>
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none; 
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
  touch-action: none; 
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(5px);
  color: white;
  position: relative;
  z-index: 10;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 220px; 
  position: relative;
}

.machine {
  position: relative;
  width: 350px; 
  height: 350px; 
}

.frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; 
  transform: scale(1.25); 
  transform-origin: center;
}

.reels {
  position: absolute;
  top: 28px;    
  left: -8px;  
  width: 365px; 
  height: 350px; 
  display: flex;
  justify-content: center; 
  gap: 10px;    
  overflow: hidden; 
  z-index: 2;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 85px;  
  align-items: center;
}

.reel img {
  width: 85px;  
  height: 85px; 
  object-fit: contain;
  margin-bottom: 18px; 
}

/* SIDEBAR */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 12px 8px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 12px;
  border: 1px solid #ffffff50;
}

.controls {
  position: fixed;
  bottom: 50px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 15px;
  z-index: 10;
}

.bet-bar {
  position: relative;
  width: 90%;
  max-width: 520px;
}

.bet-bar img {
  width: 100%;
  transform: scale(1.5);
}

.bet-text {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  color: white;
  font-weight: bold;
  font-size: 20px;
}

.spin-btn {
  position: absolute;
  right: 15px;
  bottom: 15px;
  width: 28%;
  max-width: 180px;
  z-index: 20;
}

.spin-btn img {
  width: 100%;
  cursor: pointer;
}

/* ✨ NEW: WIN OVERLAY STYLE (CASINO TYPE) */
#winOverlay {
  display: none; 
  position: fixed; 
  top: 0; left: 0; 
  width: 100%; height: 100%; 
  background: rgba(0,0,0,0.9); 
  z-index: 1000; 
  flex-direction: column; 
  justify-content: center; 
  align-items: center;
}

.win-box {
  position: relative;
  text-align: center;
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.win-title {
  font-weight: 900;
  font-size: 50px;
  background: linear-gradient(to bottom, #fff700, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 15px gold);
  margin: 0;
}

.win-amount {
  font-size: 35px;
  color: white;
  margin: 15px 0;
  text-shadow: 0 0 10px #00fff2;
}

.collect-btn {
  padding: 15px 50px;
  font-size: 18px;
  font-family: 'Orbitron';
  background: linear-gradient(180deg, #ffb300, #fb8c00);
  border: none;
  border-radius: 50px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 0 #b35900;
}

.rays {
  position: absolute;
  width: 600px; height: 600px;
  background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.2), transparent 30deg);
  animation: rotateRays 5s linear infinite;
  z-index: -1;
}

@keyframes rotateRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

/* ✨ GLOW FOR GEMS */
.glow {
  filter: drop-shadow(0 0 15px gold) brightness(1.2);
  transform: scale(1.1);
  transition: 0.3s;
}
</style>
</head>
<body oncontextmenu="return false;"> 

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1030</span></div>
</div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebtn">🎁 Bonus</div>
    <div class="sidebtn">500x</div>
    <div class="sidebtn">100x</div>
  </div>
</div>

<div class="controls">
  <div class="bet-bar">
    <img src="bet-bar.png" alt="bet">
    <div class="bet-text">BET 1</div>
  </div>

  <div class="spin-btn" id="spinBtn">
    <img src="spin-btn.png" alt="spin">
  </div>
</div>

<div id="winOverlay">
  <div class="rays"></div>
  <div class="win-box">
    <h1 class="win-title">BIG WIN!</h1>
    <div class="win-amount" id="winLabel">+0</div>
    <button class="collect-btn" onclick="closeWin()">COLLECT</button>
  </div>
</div>

<script src="script.js"></script>
<script>
// SPIN BUTTON LOGIC
const spinBtn = document.getElementById('spinBtn');
spinBtn.addEventListener('click', () => {
    if (typeof spin === "function") spin(); 
});

// PREVENT LONG PRESS
document.body.addEventListener('contextmenu', e => e.preventDefault());

/* 🔹 WIN OVERLAY FUNCTIONS (Call these from script.js) */
function showWinAnimation(amount) {
  const overlay = document.getElementById("winOverlay");
  const winLabel = document.getElementById("winLabel");
  const coinsEl = document.getElementById("coins");

  winLabel.innerText = "+" + amount + " COINS";
  overlay.style.display = "flex";

  // Smooth Coin Count-up
  let currentCoins = parseInt(coinsEl.innerText);
  let targetCoins = currentCoins + amount;
  let step = Math.ceil(amount / 20);
  
  let counter = setInterval(() => {
    currentCoins += step;
    if (currentCoins >= targetCoins) {
      currentCoins = targetCoins;
      clearInterval(counter);
    }
    coinsEl.innerText = currentCoins;
  }, 50);
}

function closeWin() {
  document.getElementById("winOverlay").style.display = "none";
  document.querySelectorAll('.glow').forEach(el => el.classList.remove('glow'));
}
</script>

</body>
</html>
