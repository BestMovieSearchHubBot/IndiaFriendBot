<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
* { 
  box-sizing: border-box; 
  -webkit-user-select: none; 
  user-select: none; 
}

body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center/cover fixed;
  height: 100vh;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px 15px;
  background: rgba(255,255,255,0.2);
  color: white;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid gold;
}

/* MACHINE */
.machine-container {
  display: flex;
  justify-content: center;
  margin-top: 200px;
}

.machine {
  position: relative;
  width: 350px;
  height: 350px;
}

.frame {
  width: 100%;
  position: absolute;
  z-index: 3;
}

/* 🎰 WIN FRAME */
.win-frame{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.7);
  width:260px;
  padding:18px;
  border-radius:18px;
  background:linear-gradient(145deg,#3b2a00,#ffd700,#3b2a00);
  z-index:5;
  opacity:0;
  transition:0.3s;
}

.win-frame.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.win-inner{
  background:#111;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.win-text{
  color:#ffd700;
  font-size:20px;
}

.win-coins{
  font-size:26px;
  color:#00ffcc;
  margin-top:8px;
}

/* 🎯 WIN EFFECTS */
.normal-win{
  box-shadow:0 0 15px gold;
}

.big-win{
  animation:bigWinAnim 0.6s infinite alternate;
}

@keyframes bigWinAnim{
  0%{ transform:translate(-50%,-50%) scale(1); box-shadow:0 0 10px gold;}
  100%{ transform:translate(-50%,-50%) scale(1.12); box-shadow:0 0 40px gold;}
}

/* REELS */
.reels {
  position: absolute;
  top: 30px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  overflow: hidden;
  z-index: 2;
}

.reel {
  width: 85px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.reel img {
  width: 85px;
  height: 85px;
  margin-bottom: 18px;
  transition: 0.3s;
}

/* ✨ GLOW */
@keyframes winGlow {
  50% { transform: scale(1.2); filter: drop-shadow(0 0 15px gold); }
}
.win {
  animation: winGlow 0.8s 3;
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-between;
  padding: 15px;
  color: white;
}

.spin {
  background: orange;
  padding: 10px 30px;
  border-radius: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1030</span></div>
</div>

<div class="machine-container">
  <div class="machine">

    <img src="frame.png" class="frame">

    <!-- 🎰 WIN FRAME -->
    <div id="winFrame" class="win-frame">
      <div class="win-inner">
        <div id="winText" class="win-text">YOU WIN</div>
        <div id="winCoins" class="win-coins">+0</div>
      </div>
    </div>

    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>

  </div>
</div>

<div class="controls">
  <div>BET 1</div>
  <div class="spin" id="spinBtn">SPIN</div>
</div>

<script>
const gems = [
  "gems/red.png",
  "gems/blue.png",
  "gems/green.png",
  "gems/yellow.png",
  "gems/purple.png"
];

let coins = 1030;
let coinsEl = document.getElementById("coins");

let isSpinning = false;
let finishedReels = 0;

/* CREATE REEL */
function createReel(id){
  let reel = document.getElementById(id);
  reel.innerHTML = "";

  for(let i=0;i<15;i++){
    let img = document.createElement("img");
    img.src = gems[Math.floor(Math.random()*gems.length)];
    reel.appendChild(img);
  }
}

/* INIT */
createReel("r1");
createReel("r2");
createReel("r3");

/* SPIN BUTTON */
document.getElementById("spinBtn").onclick = spin;

/* SPIN */
function spin(){
  if(isSpinning) return;

  isSpinning = true;
  finishedReels = 0;

  spinReel("r1",0);
  spinReel("r2",200);
  spinReel("r3",400);
}

/* SPIN ANIMATION */
function spinReel(id, delay){
  let reel = document.getElementById(id);
  let height = 103 * reel.children.length;

  let start=null;
  let duration=2500+delay;

  function ease(t){ return 1-Math.pow(1-t,3); }

  function anim(ts){
    if(!start) start=ts;
    let p=ts-start;
    let t=Math.min(p/duration,1);
    let move=ease(t)*(height*3);

    reel.style.transform=`translateY(${-move%height}px)`;

    if(p<duration){
      requestAnimationFrame(anim);
    } else {
      reel.style.transform="translateY(0)";
      createReel(id);

      finishedReels++;
      if(finishedReels===3){
        setTimeout(()=>{
          checkWin();
          isSpinning=false;
        },200);
      }
    }
  }

  setTimeout(()=>requestAnimationFrame(anim),delay);
}

/* WIN FRAME */
function showWinFrame(amount){
  let frame=document.getElementById("winFrame");
  let text=document.getElementById("winText");
  let coin=document.getElementById("winCoins");

  coin.textContent="+"+amount;

  frame.classList.remove("normal-win","big-win");

  if(amount>=50){
    text.textContent="BIG WIN 🔥";
    frame.classList.add("big-win");
  } else {
    text.textContent="YOU WIN";
    frame.classList.add("normal-win");
  }

  frame.classList.add("show");

  setTimeout(()=>{
    frame.classList.remove("show","normal-win","big-win");
  },2000);
}

/* CHECK WIN */
function checkWin(){
  let r1=document.getElementById("r1");
  let r2=document.getElementById("r2");
  let r3=document.getElementById("r3");

  let win=0;
  let pos=[];

  for(let i=0;i<3;i++){
    let a=r1.children[i];
    let b=r2.children[i];
    let c=r3.children[i];

    if(a.src===b.src && b.src===c.src){
      win+=50;
      pos.push({reel:'r1',index:i},{reel:'r2',index:i},{reel:'r3',index:i});
    }
    else if(a.src===b.src || b.src===c.src || a.src===c.src){
      win+=10;
    }
  }

  if(win>0){
    coins+=win;
    coinsEl.textContent=coins;

    showWinFrame(win);

    pos.forEach(p=>{
      let gem=document.getElementById(p.reel).children[p.index];
      gem.classList.add("win");
      setTimeout(()=>gem.classList.remove("win"),1000);
    });
  }
}
</script>

</body>
</html>
