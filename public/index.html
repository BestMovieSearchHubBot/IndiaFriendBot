<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Gems</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: 'Orbitron', sans-serif;
  background:url('bg.jpg') no-repeat center 80%/cover;
  color:white;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.6);
}

.coins{
  background:#111;
  padding:5px 15px;
  border-radius:20px;
}

/* 🎰 MACHINE */
.machine{
  position:relative;
  width:320px;
  margin:auto;
  margin-top:20px;
}

/* FRAME */
.frame{
  position:absolute;
  width:100%;
  z-index:3;
}

/* GRID IMAGE */
.grid-bg{
  position:absolute;
  top:70px;
  left:25px;
  width:270px;
  height:270px;
  z-index:2;
}

/* REAL GRID */
.grid{
  position:absolute;
  top:70px;
  left:25px;
  width:270px;
  height:270px;

  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:10px;

  z-index:1;
}

.box{
  background:transparent;
  overflow:hidden;
  position:relative;
}

/* ITEM */
.item{
  position:absolute;
  top:-100px;
  width:100%;
  height:100%;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: top 0.4s ease;
}

.show{
  top:0;
}

/* SIDEBAR */
.sidebar{
  position:absolute;
  right:10px;
  top:100px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebtn{
  background:purple;
  padding:15px;
  border-radius:10px;
}

/* CONTROLS */
.controls{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.spin{
  background:orange;
  padding:15px 30px;
  border-radius:50px;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">0</span></div>
</div>

<!-- 🎰 MACHINE -->
<div class="machine">

  <img src="frame.png" class="frame">
  <img src="grid.png" class="grid-bg">

  <div class="grid" id="grid"></div>

</div>

<div class="sidebar">
  <div class="sidebtn">🎁 Bonus</div>
  <div class="sidebtn">500x</div>
  <div class="sidebtn">100x</div>
</div>

<div class="controls">
  <div>-</div>
  <div>BET 1</div>
  <div>+</div>
  <div class="spin" onclick="spin()">SPIN</div>
</div>

<script src="script.js"></script>

</body>
</html>
