<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
/* 🔴 GLOBAL FIXES: Scroll & Selection disable karne ke liye */
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; /* iOS context menu prevent */
  -webkit-user-select: none;   /* Disable selection */
  -khtml-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden; /* Scroll disable */
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(5px);
  color: white;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 260px; /* Adjust according to your screen */
  position: relative;
}

.machine {
  position: relative;
  width: 350px; /* Base width */
  height: 350px; /* Base height */
}

/* FRAME */
.frame {
  position: absolute;
  top: 15px;
  left: 2px;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; /* Click reels ke piche na ruke */
  transform: scale(1.2); 
  transform-origin: center;
}

/* 🎰 REELS AREA - Precision fitting changes */
.reels {
  position: absolute;
  top: 55px;    /* Frame ke upar-neeche box position */
  left: 20px;   /* Frame ke left box position */
  width: 310px; /* Total width increased */
  height: 270px; /* Total height increased */
  display: flex;
  overflow: hidden; 
  z-index: 2;
  /* 🔴 EXTRA LOCK: Long press disable on container level */
  -webkit-touch-callout: none;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 33.33%; /* Teen equal columns */
  align-items: center; /* Gems center aligned horizontally */
  gap: 12px;   /* Vertical gap between gems increased */
}

.reel img {
  width: 100px; /* Fixed larger size per gem */
  height: 85px; /* Proportional height to fill the box */
  object-fit: contain; /* Don't squash the gem */
  display: block;
  /* 🔴 EXTRA LOCK: Specific lock for images to prevent browser menu */
  -webkit-touch-callout: none;
  pointer-events: none; /* Click reels ke piche jaise spin handle ho */
}

/* SIDEBAR - In-game features */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 12px 8px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 12px;
  border: 1px solid #ffffff50;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  color: white;
  border-top: 2px solid #444;
}

.bet-control {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 18px;
}

.spin {
  background: linear-gradient(180deg, #ffb300, #fb8c00);
  padding: 12px 40px;
  border-radius: 30px;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 0 #b35900;
  transition: 0.1s;
}

.spin:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #b35900;
}
</style>

</head>

<body>

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1120</span></div>
</div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebtn">🎁 Bonus</div>
    <div class="sidebtn">500x</div>
    <div class="sidebtn">100x</div>
  </div>
</div>

<div class="controls">
  <div class="bet-control">
    <span>-</span>
    <span>BET 1</span>
    <span>+</span>
  </div>
  <div class="spin" onclick="spin()">SPIN</div>
</div>

<script src="script.js"></script>
</body>
</html>
