<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none; 
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
  touch-action: none; 
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(5px);
  color: white;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 220px; 
  position: relative;
}

.machine {
  position: relative;
  width: 350px; 
  height: 350px; 
}

/* FRAME */
.frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; 
  transform: scale(1.25); 
  transform-origin: center;
}

/* 🎰 REELS AREA */
.reels {
  position: absolute;
  top: 28px;    
  left: -8px;  
  width: 365px; 
  height: 350px; 
  display: flex;
  justify-content: center; 
  gap: 10px;    
  overflow: hidden; 
  z-index: 2;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 85px;  
  align-items: center;
}

.reel img {
  width: 85px;  
  height: 85px; 
  object-fit: contain;
  margin-bottom: 18px; 
  transition: transform 0.3s, filter 0.3s;
}

/* SIDEBAR */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 12px 8px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 12px;
  border: 1px solid #ffffff50;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.controls {
  position: fixed;
  bottom: 50px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  z-index: 10;
}

.bet-bar {
  position: absolute;
  bottom: 20px;
  left: 0;
  width: 70%;   /* 👈 isko 80% bhi kar sakte ho */
  height: auto;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* Image ko bada karo */
.bet-bar img {
  width: 100%;
  height: auto;
  transform: scale(1.2); /* 👈 isse size bada dikhega */
}

/* CLICK AREA bhi scale ke hisaab se */
.bet-minus, .bet-plus {
  position: absolute;
  top: 0;
  width: 25%;
  height: 100%;
  cursor: pointer;
}

/* TEXT size bhi bada karo */
.bet-text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 22px; /* 👈 bada */
  font-weight: bold;
}

.bet-minus { left: 10%; }
.bet-text { left: 35%; }
.bet-plus { right: 10%; }

/* SPIN BUTTON */
.spin-btn {
  width: 35%;
}

.spin-btn img {
  width: 100%;
  cursor: pointer;
  transition: 0.1s;
}

.spin-btn:active img {
  transform: scale(0.95);
}

.bet-control {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 18px;
}

.spin {
  background: linear-gradient(180deg, #ffb300, #fb8c00);
  padding: 12px 40px;
  border-radius: 30px;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 0 #b35900;
  transition: 0.1s;
}

.spin:active {
  transform: scale(0.95);
}

/* 🔒 Long press / touch hold popup disable */
img, .sidebtn, .spin, .reel {
  -webkit-touch-callout: none;  
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  pointer-events: auto; 
}

/* ✨ WIN GLOW ANIMATION */
@keyframes winGlow {
  0% { transform: scale(1); filter: drop-shadow(0 0 0px gold); }
  50% { transform: scale(1.2); filter: drop-shadow(0 0 15px gold); }
  100% { transform: scale(1); filter: drop-shadow(0 0 0px gold); }
}

.win {
  animation: winGlow 0.8s ease-in-out 3;
}
</style>
</head>
<body oncontextmenu="return false;"> 
<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1030</span></div>
</div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebtn">🎁 Bonus</div>
    <div class="sidebtn">500x</div>
    <div class="sidebtn">100x</div>
  </div>
</div>

<div class="controls">

  <!-- BET BAR IMAGE -->
  <div class="bet-bar">
    <img src="bet-bar.png" alt="bet">
    
    <!-- clickable areas -->
    <div class="bet-minus">-</div>
    <div class="bet-text">BET 1</div>
    <div class="bet-plus">+</div>
  </div>

  <!-- SPIN BUTTON IMAGE -->
  <div class="spin-btn" id="spinBtn">
    <img src="spin-btn.png" alt="spin">
  </div>

</div>

<script src="script.js"></script>
<script>
const spinBtn = document.getElementById('spinBtn');

// Normal click pe spin function call kare
spinBtn.addEventListener('click', () => {
    if (typeof spin === "function") spin(); // aapke script.js me spin function call hoga
});

// Long press / contextmenu safe without blocking normal click
spinBtn.addEventListener('touchstart', e => e.stopPropagation(), {passive:true});
spinBtn.addEventListener('mousedown', e => e.stopPropagation());

// Prevent general long press / right click
document.body.addEventListener('contextmenu', e => e.preventDefault());
document.body.addEventListener('touchstart', e => {
    const t = e.target;
    if (!t.classList.contains('spin') && !t.classList.contains('sidebtn') && t.tagName !== 'IMG') {
        return; 
    }
    e.preventDefault();
}, {passive:false});

/* 🔹 WIN GLOW JS HELPER */
function handleWin(winPositions) {
  // winPositions = [{reel:'r1', index:1}, ...]
  winPositions.forEach(pos => {
    const reel = document.getElementById(pos.reel);
    const gem = reel.children[pos.index];
    if(gem) {
      gem.classList.add('win');
      gem.addEventListener('animationend', () => {
        gem.classList.remove('win');
      });
    }
  });
}

// Example usage: middle gems glow
// handleWin([{reel:'r1', index:1}, {reel:'r2', index:1}, {reel:'r3', index:1}]);
</script>

</body>
</html>
