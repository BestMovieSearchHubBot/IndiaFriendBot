<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Gems</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:url('bg.jpg') no-repeat center -0%/cover;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background: rgba(255,255,255,0.6);
}

.coins{
  background:#111;
  padding:5px 15px;
  border-radius:20px;
}

/* MACHINE */
.machine{
  position:relative;
  width:320px;
  margin:auto;
  margin-top:20px;

  transform: scale(1.3);   /* 👈 yahan change karo */
  transform-origin: top center;
}

/* FRAME */
.frame{
  position:absolute;
  width:100%;
  z-index:3;
}

/* 🎰 REELS */
.reels{
  position:absolute;
  top:70px;
  left:25px;
  width:270px;
  height:270px;

  display:flex;
  justify-content:space-between;
  overflow:hidden;
  z-index:2;
}

.reel{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;   /* 👈 yahin se gap control hota hai */
}

.reel img{
  width:100%;
  height:75px;
  object-fit:contain;
  display:block;
}

/* SIDEBAR */
.sidebar{
  position:absolute;
  right:10px;
  top:100px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebtn{
  background:purple;
  padding:15px;
  border-radius:10px;
}

/* CONTROLS */
.controls{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.spin{
  background:orange;
  padding:15px 30px;
  border-radius:50px;
  font-size:18px;
}
</style>

</head>

<body>

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1000</span></div>
</div>

<div class="machine">

  <img src="frame.png" class="frame">

  <div class="reels">
    <div class="reel" id="r1"></div>
    <div class="reel" id="r2"></div>
    <div class="reel" id="r3"></div>
  </div>

</div>

<div class="sidebar">
  <div class="sidebtn">🎁 Bonus</div>
  <div class="sidebtn">500x</div>
  <div class="sidebtn">100x</div>
</div>

<div class="controls">
  <div>-</div>
  <div>BET 1</div>
  <div>+</div>
  <div class="spin" onclick="spin()">SPIN</div>
</div>

<script src="script.js"></script>

</body>
</html>
