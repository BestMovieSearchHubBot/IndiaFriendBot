<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

<style>
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none; 
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
  touch-action: none; 
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(5px);
  color: white;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 220px; 
  position: relative;
}

.machine {
  position: relative;
  width: 350px; 
  height: 350px; 
}

/* FRAME */
.frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; 
  transform: scale(1.25); 
  transform-origin: center;
}

/* 🎰 REELS AREA */
.reels {
  position: absolute;
  top: 28px;    
  left: -8px;  
  width: 365px; 
  height: 350px; 
  display: flex;
  justify-content: center; 
  gap: 10px;    
  overflow: hidden; 
  z-index: 2;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 85px;  
  align-items: center;
}

.reel img {
  width: 85px;  
  height: 85px; 
  object-fit: contain;
  margin-bottom: 18px; 
  transition: transform 0.3s, filter 0.3s;
}

/* SIDEBAR */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 12px 8px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 12px;
  border: 1px solid #ffffff50;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.controls {
  position: fixed;
  bottom: 50px;
  width: 100%;
  display: flex;
  justify-content: center;  /* 👈 BET ko center karega */
  align-items: center;
  padding: 10px 15px;
  z-index: 10;
}

/* BET BAR (CENTER) */
.bet-bar {
  position: relative;
  width: 90%;
  max-width: 520px;
  margin: 0 auto;   /* 👈 extra safety center */
}

.bet-bar img {
  width: 100%;
  transform: scale(1.5);
}

/* CLICK AREAS */
.bet-minus, .bet-plus {
  position: absolute;
  top: 0;
  width: 25%;
  height: 100%;
  cursor: pointer;
}

.bet-minus { left: 0; }
.bet-plus { right: 0; }

/* TEXT */
.bet-text {
  position: absolute;
  left: 15px
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  color: white;
  font-weight: bold;
  font-size: 20px;
  pointer-events: none;
}

/* 🔥 SPIN BUTTON (RIGHT SIDE FIX) */
.spin-btn {
  position: absolute;   /* 👈 MAIN FIX */
  right: 15px;          /* 👈 right side chipka */
  bottom: 15;

  width: 28%;
  max-width: 180px;
  z-index: 20;
}

.spin-btn img {
  width: 100%;
  cursor: pointer;
  transition: 0.1s;
}

.spin-btn:active img {
  transform: scale(0.95);
}
.bet-control {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 18px;
}

.spin {
  background: linear-gradient(180deg, #ffb300, #fb8c00);
  padding: 12px 40px;
  border-radius: 30px;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 0 #b35900;
  transition: 0.1s;
}

.spin:active {
  transform: scale(0.95);
}

/* 🔒 Long press / touch hold popup disable */
img, .sidebtn, .spin, .reel {
  -webkit-touch-callout: none;  
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  pointer-events: auto; 
}

/* ✨ WIN GLOW ANIMATION */
@keyframes winGlow {
  0% { transform: scale(1); filter: drop-shadow(0 0 0px gold); }
  50% { transform: scale(1.2); filter: drop-shadow(0 0 15px gold); }
  100% { transform: scale(1); filter: drop-shadow(0 0 0px gold); }
}

.win {
  animation: winGlow 0.8s ease-in-out 3;
}

/* ✨ NAYA: WIN OVERLAY STYLING */
#winOverlay {
  display: none; 
  position: fixed; 
  top: 0; left: 0; 
  width: 100%; height: 100%; 
  background: rgba(0,0,0,0.85); 
  z-index: 1000; 
  flex-direction: column; 
  justify-content: center; 
  align-items: center;
  overflow: hidden;
}

.win-box {
  position: relative;
  text-align: center;
  animation: popScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.win-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 50px;
  background: linear-gradient(to bottom, #fff700, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 15px rgba(255,140,0,0.8));
  margin: 0;
  letter-spacing: 2px;
}

.win-amount {
  font-size: 35px;
  color: white;
  margin: 15px 0;
  text-shadow: 0 0 10px #00fff2;
}

.collect-btn {
  padding: 15px 50px;
  font-size: 20px;
  font-family: 'Orbitron';
  background: linear-gradient(180deg, #00ff88, #008f4c);
  border: none;
  border-radius: 50px;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,255,136,0.4);
}

/* Rays Rotation Animation */
.rays {
  position: absolute;
  width: 600px; height: 600px;
  background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.2), transparent 30deg);
  animation: rotateRays 5s linear infinite;
  z-index: -1;
}

@keyframes rotateRays {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes popScale {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* Glow Effect for Gems */
.glow {
  filter: drop-shadow(0 0 15px gold) brightness(1.2);
  transform: scale(1.1);
  transition: 0.3s;
}
</style>
</head>
<body oncontextmenu="return false;"> 

<div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1000</span></div>
</div>

<div id="winOverlay">
  <div class="rays"></div>
  <div class="win-box">
    <h1 class="win-title">BIG WIN!</h1>
    <div class="win-amount" id="winLabel">+0</div>
    <button class="collect-btn" onclick="closeWin()">COLLECT</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
