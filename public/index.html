<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Pro</title>

<style>
body{
  margin:0;
  background:#0b1d0b;
  font-family:sans-serif;
  text-align:center;
  color:#fff;
}

/* TOP BAR */
.top{
  padding:10px;
  background:#111;
  font-size:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(3, 90px);
  gap:10px;
  justify-content:center;
  margin-top:40px;
}

/* BOX */
.box{
  width:90px;
  height:90px;
  background:gold;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  font-size:40px;
}

/* FALL ITEM */
.item{
  position:absolute;
  top:-100px;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: top 0.6s ease;
}

/* FINAL POSITION */
.show{
  top:0;
}

/* BUTTON */
button{
  margin-top:30px;
  padding:15px 40px;
  font-size:20px;
  background:orange;
  border:none;
  border-radius:10px;
}

</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="top">🎰 Coins: <span id="coins">0</span></div>

<div class="grid" id="grid"></div>

<button onclick="spin()">SPIN</button>

<script src="script.js"></script>

</body>
</html>
