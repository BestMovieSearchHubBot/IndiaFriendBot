<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
body { margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; background: url('bg.jpg') no-repeat center center fixed; background-size: cover; height: 100vh; overflow: hidden; touch-action: none; }
.topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); color: white; position: relative; z-index: 10; border-bottom: 1px solid #ffd966; }
.coins { background: #111; padding: 5px 18px; border-radius: 40px; border: 1px solid #ffd700; font-weight: bold; }
.machine-container { display: flex; justify-content: center; align-items: center; margin-top: 180px; position: relative; }
.machine { position: relative; width: 350px; height: 350px; }
.frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; transform: scale(1.25); transform-origin: center; }
.reels { position: absolute; top: 28px; left: -8px; width: 365px; height: 350px; display: flex; justify-content: center; gap: 10px; overflow: hidden; z-index: 2; }
.reel { display: flex; flex-direction: column; width: 85px; align-items: center; }
.reel img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 18px; border-radius: 15px; background: rgba(0,0,0,0.3); }

/* New Sidebar: Referral & Redeem buttons */
.sidebar-new {
  position: absolute;
  right: -70px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 15;
}
.sidebar-btn {
  background: linear-gradient(145deg, #2a2418, #1a1207);
  padding: 14px 12px;
  border-radius: 60px;
  font-weight: bold;
  font-size: 14px;
  text-align: center;
  color: #ffec9f;
  border: 2px solid #e4b83e;
  box-shadow: 0 8px 0 #5a3e1a;
  cursor: pointer;
  font-family: 'Orbitron', monospace;
  width: 80px;
  transition: 0.05s linear;
}
.sidebar-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #5a3e1a; }

.controls { position: fixed; bottom: 50px; width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px 15px; z-index: 10; }
.bet-bar { position: relative; width: 90%; max-width: 520px; }
.bet-bar img { width: 100%; transform: scale(1.5); }
.bet-text { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; color: white; font-weight: bold; font-size: 20px; }
.spin-btn { position: absolute; right: 15px; bottom: 15px; width: 28%; max-width: 180px; z-index: 20; }
.spin-btn img { width: 100%; cursor: pointer; }

/* Win Overlay */
#winOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
.win-box { text-align: center; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: linear-gradient(145deg, #2a1f0e, #1a1207); padding: 30px 50px; border-radius: 70px; border: 3px solid gold; }
.win-title { font-weight: 900; font-size: 54px; background: linear-gradient(to bottom, #fff700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
.win-amount { font-size: 40px; color: white; margin: 20px 0; text-shadow: 0 0 10px #ffaa00; }
.collect-btn { padding: 15px 50px; font-size: 20px; font-family: 'Orbitron'; background: linear-gradient(180deg, #ffb300, #fb8c00); border: none; border-radius: 50px; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #b35900; }
.rays { position: absolute; width: 600px; height: 600px; background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.2), transparent 30deg); animation: rotateRays 5s linear infinite; z-index: -1; }
@keyframes rotateRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
.glow { filter: drop-shadow(0 0 15px gold) brightness(1.2); transform: scale(1.05); transition: 0.2s; }

/* Modals (Casino Style) */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
.modal-content { background: linear-gradient(145deg, #2a2418, #1a1408); border: 2px solid #f5bc70; border-radius: 50px; padding: 30px 25px; text-align: center; width: 90%; max-width: 380px; font-family: 'Orbitron', monospace; }
.modal-header { font-size: 26px; font-weight: bold; background: linear-gradient(135deg, #ffd966, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; }
.refer-code-box { background: #000000aa; font-size: 32px; letter-spacing: 5px; padding: 15px; border-radius: 30px; border: 1px solid gold; font-weight: bold; color: #ffdf80; margin: 15px 0; }
.casino-select, .casino-input { width: 100%; padding: 12px; margin: 12px 0; background: #1e1a0e; border: 1px solid #e4b83e; border-radius: 40px; color: white; font-family: 'Orbitron', monospace; text-align: center; }
.casino-btn { background: linear-gradient(180deg, #ffb300, #fb8c00); border: none; border-radius: 40px; padding: 12px 25px; margin: 8px; font-family: 'Orbitron', monospace; font-weight: bold; color: #1f1a0a; cursor: pointer; box-shadow: 0 4px 0 #b35900; transition: 0.05s linear; }
.casino-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b35900; }
.casino-btn.secondary { background: linear-gradient(180deg, #4a4a4a, #2a2a2a); box-shadow: 0 4px 0 #111; color: #ffdf80; }
.redeem-msg { margin-top: 10px; color: #ffaa44; font-size: 12px; }
</style>
</head>
<body>
<div class="topbar"><div>👤 <span id="username">Player</span></div><div class="coins">💰 <span id="coins">0.00</span></div></div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>
  <!-- नया Sidebar: Referral और Redeem बटन -->
  <div class="sidebar-new">
    <div class="sidebar-btn" id="referBtn">🔗 REFER</div>
    <div class="sidebar-btn" id="redeemBtn">🎁 REDEEM</div>
  </div>
</div>

<div class="controls">
  <div class="bet-bar"><img src="bet-bar.png" alt="bet"><div class="bet-text">BET 1</div></div>
  <div class="spin-btn" id="spinBtn"><img src="spin-btn.png" alt="spin"></div>
</div>

<div id="winOverlay"><div class="rays"></div><div class="win-box"><h1 class="win-title">BIG WIN!</h1><div class="win-amount" id="winLabel">+0</div><button class="collect-btn" id="collectBtn">COLLECT</button></div></div>

<!-- Referral Modal -->
<div id="referModal" class="modal"><div class="modal-content"><div class="modal-header">🔗 YOUR REFERRAL CODE</div><div class="refer-code-box" id="referCodeDisplay">XXXXXX</div><p class="refer-info">Share this code with friends.<br>They get 10 coins, you get 10 coins!</p><button class="casino-btn" id="closeReferModal">CLOSE</button></div></div>

<!-- Redeem Modal -->
<div id="redeemModal" class="modal"><div class="modal-content"><div class="modal-header">🎁 REDEEM REWARDS</div>
<select id="redeemType" class="casino-select"><option value="amazon">🎟️ Amazon Gift Voucher (500 coins)</option><option value="googleplay">🎟️ Google Play Voucher (500 coins)</option><option value="freediamond">💎 Free Fire 500 Diamonds (420 coins)</option></select>
<div id="emailField"><input type="email" id="redeemEmail" placeholder="Your Email for Voucher" class="casino-input"></div>
<div id="uidField" style="display:none"><input type="text" id="redeemUid" placeholder="Free Fire UID" class="casino-input"></div>
<button id="submitRedeem" class="casino-btn">REDEEM NOW</button><button id="closeRedeemModal" class="casino-btn secondary">CANCEL</button><p id="redeemMsg" class="redeem-msg"></p></div></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand(); tg.ready();

let userId = null, currentCoins = 0, isSpinning = false, bigWinAmount = 0;
const gemsList = [
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/red.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/blue.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/green.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/yellow.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/purple.png"
];

function createReelDom(id, imagesArray) {
  const reel = document.getElementById(id);
  reel.innerHTML = "";
  imagesArray.forEach(src => { let img = document.createElement("img"); img.src = src; reel.appendChild(img); });
}
function generateRandomReelImages() {
  let gemCount = {}; gemsList.forEach(g => gemCount[g] = 0);
  let arr = [];
  while (arr.length < 15) { let gem = gemsList[Math.floor(Math.random() * gemsList.length)]; if (gemCount[gem] < 3) { arr.push(gem); gemCount[gem]++; } }
  arr.sort(() => Math.random() - 0.5);
  return arr;
}
function initReels() { for(let i=1;i<=3;i++) createReelDom(`r${i}`, generateRandomReelImages()); }
initReels();

function updateCoinDisplay() { document.getElementById("coins").innerText = currentCoins.toFixed(2); }
function enableSpinButton(enabled) { const btn = document.getElementById("spinBtn"); btn.style.pointerEvents = enabled ? "auto" : "none"; btn.style.opacity = enabled ? "1" : "0.6"; }

function animateSpin(finalMatrix) {
  return new Promise((resolve) => {
    let spins = 0, total = 20;
    const interval = setInterval(() => {
      for (let i=1;i<=3;i++) { let rand = []; for(let s=0;s<15;s++) rand.push(gemsList[Math.floor(Math.random()*gemsList.length)]); createReelDom(`r${i}`, rand); }
      spins++;
      if (spins >= total) {
        clearInterval(interval);
        for (let col=0;col<3;col++) {
          let colImages = [];
          for (let row=0;row<3;row++) colImages.push(finalMatrix[row][col]);
          let fullReel = [...colImages, ...colImages, ...colImages, ...colImages, ...colImages].slice(0,15);
          createReelDom(`r${col+1}`, fullReel);
        }
        resolve();
      }
    }, 50);
  });
}

function highlightWins(matrix) {
  document.querySelectorAll('.glow').forEach(el => el.classList.remove('glow'));
  for (let row=0;row<3;row++) {
    const a=matrix[row][0], b=matrix[row][1], c=matrix[row][2];
    if (a===b && b===c) {
      for(let col=0;col<3;col++) document.getElementById(`r${col+1}`).children[row]?.classList.add('glow');
    } else if (a===b || b===c || a===c) {
      let pairs = []; if(a===b) pairs.push([0,1]); if(b===c) pairs.push([1,2]); if(a===c) pairs.push([0,2]);
      for(let pair of pairs) for(let col of pair) document.getElementById(`r${col+1}`).children[row]?.classList.add('glow');
    }
  }
}

function updateCoinsSmooth(targetCoins, callback) {
  let start = currentCoins, step = Math.max(0.05, (targetCoins-start)/20);
  let interval = setInterval(() => {
    start += step;
    if (start >= targetCoins) { start = targetCoins; clearInterval(interval); currentCoins = targetCoins; updateCoinDisplay(); if(callback) callback(); }
    else { currentCoins = start; updateCoinDisplay(); }
  }, 30);
}

function showBigWinOverlay(amount) { document.getElementById("winLabel").innerText = `+${amount.toFixed(2)} COINS`; document.getElementById("winOverlay").style.display = "flex"; bigWinAmount = amount; }
function closeWin() {
  document.getElementById("winOverlay").style.display = "none";
  updateCoinsSmooth(currentCoins + bigWinAmount, () => { isSpinning = false; enableSpinButton(true); });
  bigWinAmount = 0;
}

async function spin() {
  if (isSpinning) return;
  isSpinning = true; enableSpinButton(false);
  try {
    const res = await fetch('/api/spin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    currentCoins = data.newCoins - data.win; updateCoinDisplay();
    await animateSpin(data.matrix);
    highlightWins(data.matrix);
    if (data.win > 0) {
      if (data.win >= 15) showBigWinOverlay(data.win);
      else updateCoinsSmooth(currentCoins + data.win, () => { isSpinning = false; enableSpinButton(true); clearGlows(); });
    } else { isSpinning = false; enableSpinButton(true); clearGlows(); }
  } catch(e) { alert("Spin failed"); console.error(e); isSpinning = false; enableSpinButton(true); }
}
function clearGlows() { document.querySelectorAll('.glow').forEach(el => el.classList.remove('glow')); }

// Auth
async function initAuth() {
  const tgUser = tg.initDataUnsafe?.user;
  if (!tgUser) { alert("Open from Telegram"); return; }
  const telegramId = tgUser.id.toString();
  const urlParams = new URLSearchParams(window.location.search);
  const referCode = urlParams.get('startapp');
  const res = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ telegramId, referCode }) });
  const data = await res.json();
  userId = data.userId; currentCoins = data.coins; updateCoinDisplay();
  document.getElementById("username").innerText = tgUser.first_name || "Player";
  window.myReferralCode = data.referralCode;
}

// Referral Modal
document.getElementById("referBtn").onclick = () => { document.getElementById("referCodeDisplay").innerText = window.myReferralCode || "LOADING"; document.getElementById("referModal").style.display = "flex"; };
document.getElementById("closeReferModal").onclick = () => document.getElementById("referModal").style.display = "none";

// Redeem Modal
document.getElementById("redeemBtn").onclick = () => { document.getElementById("redeemModal").style.display = "flex"; document.getElementById("redeemMsg").innerText = ""; };
document.getElementById("closeRedeemModal").onclick = () => document.getElementById("redeemModal").style.display = "none";
document.getElementById("redeemType").onchange = function() {
  if (this.value === "freediamond") { document.getElementById("emailField").style.display = "none"; document.getElementById("uidField").style.display = "block"; }
  else { document.getElementById("emailField").style.display = "block"; document.getElementById("uidField").style.display = "none"; }
};
document.getElementById("submitRedeem").onclick = async () => {
  const type = document.getElementById("redeemType").value;
  let email=null, uid=null;
  if (type === "freediamond") { uid = document.getElementById("redeemUid").value; if(!uid) { alert("Enter UID"); return; } }
  else { email = document.getElementById("redeemEmail").value; if(!email) { alert("Enter email"); return; } }
  const res = await fetch('/api/redeem', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId, type, email, uid }) });
  const data = await res.json();
  if (res.ok) { currentCoins = data.newCoins; updateCoinDisplay(); alert("Redemption request submitted!"); document.getElementById("redeemModal").style.display = "none"; }
  else alert(data.error);
};

document.getElementById("spinBtn").addEventListener("click", spin);
document.getElementById("collectBtn").addEventListener("click", closeWin);
initAuth();
</script>
</body>
</html>
