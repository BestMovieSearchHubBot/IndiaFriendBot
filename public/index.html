<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
* { 
  box-sizing: border-box; 
  /* Long press/Selection disable karne ke liye */
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none; 
  /* Tap highlight hatane ke liye */
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
  /* Screen bounce/scroll disable karne ke liye */
  touch-action: none; 
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(5px);
  color: white;
}

.coins {
  background: #111;
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 220px; /* Thoda adjust kiya hai balance ke liye */
  position: relative;
}

.machine {
  position: relative;
  width: 350px; 
  height: 350px; 
}

/* FRAME */
.frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none; 
  transform: scale(1.25); /* Halka sa aur bada kiya hai fitting ke liye */
  transform-origin: center;
}

/* 🎰 REELS AREA - GAPS FIX KIYE GAYE HAIN */
.reels {
  position: absolute;
  top: 18px;    /* Frame ke boxes ke center mein laane ke liye */
  left: -8px;   /* Side gaps fix karne ke liye shift kiya */
  width: 365px; /* Width badhayi taaki gems side boxes mein jayein */
  height: 310px; 
  display: flex;
  justify-content: center; /* Center alignment */
  gap: 12px;    /* Columns ke beech ka gap */
  overflow: hidden; 
  z-index: 2;
}

.reel {
  display: flex;
  flex-direction: column;
  width: 85px;  /* Har gem box ki fixed width */
  align-items: center;
}

.reel img {
  width: 85px;  /* Gems ka size bada kiya */
  height: 85px; 
  object-fit: contain;
  margin-bottom: 18px; /* Do gems ke beech ka vertical gap */
}

/* SIDEBAR */
.sidebar {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 12px 8px;
  border-radius: 8px;
  color: white;
  text-align: center;
  font-size: 12px;
  border: 1px solid #ffffff50;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  color: white;
  border-top: 2px solid #444;
}

.bet-control {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 18px;
}

.spin {
  background: linear-gradient(180deg, #ffb300, #fb8c00);
  padding: 12px 40px;
  border-radius: 30px;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 0 #b35900;
  transition: 0.1s;
}

.spin:active {
  transform: scale(0.95);
}
</style>
</head>
<body oncontextmenu="return false;"> <div class="topbar">
  <div>👤 Player</div>
  <div class="coins">💰 <span id="coins">1030</span></div>
</div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebtn">🎁 Bonus</div>
    <div class="sidebtn">500x</div>
    <div class="sidebtn">100x</div>
  </div>
</div>

<div class="controls">
  <div class="bet-control">
    <span>-</span>
    <span>BET 1</span>
    <span>+</span>
  </div>
  <div class="spin" onclick="spin()">SPIN</div>
</div>

<script src="script.js"></script>
</body>
</html>
