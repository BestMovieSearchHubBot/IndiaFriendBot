<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucky Gems Slot - Jungle Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

<style>
* { 
  box-sizing: border-box; 
  -webkit-touch-callout: none; 
  -webkit-user-select: none; 
  user-select: none; 
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0; padding: 0;
  font-family: 'Orbitron', sans-serif;
  background: #000 url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  height: 100vh; overflow: hidden;
  touch-action: none; 
}

/* TOP BAR */
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 15px; background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(5px); color: white;
  position: relative; z-index: 10;
}

.coins {
  background: #111; padding: 5px 15px;
  border-radius: 20px; border: 1px solid #ffd700;
}

/* MACHINE CONTAINER */
.machine-container {
  display: flex; justify-content: center; align-items: center;
  margin-top: 150px; position: relative;
}

.machine {
  position: relative;
  width: 350px; height: 350px; 
}

.frame {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 5; pointer-events: none; 
  transform: scale(1.25);
}

.reels {
  position: absolute; top: 28px; left: -8px;  
  width: 365px; height: 350px; 
  display: flex; justify-content: center; 
  gap: 10px; overflow: hidden; z-index: 2;
}

.reel {
  display: flex; flex-direction: column;
  width: 85px; align-items: center;
}

.reel img {
  width: 85px; height: 85px; 
  object-fit: contain; margin-bottom: 18px; 
}

/* SIDEBAR */
.sidebar {
  position: absolute; right: 5px; top: 50%;
  transform: translateY(-50%); display: flex;
  flex-direction: column; gap: 8px; z-index: 4;
}

.sidebtn {
  background: linear-gradient(180deg, #9c27b0, #4a148c);
  padding: 12px 8px; border-radius: 8px;
  color: white; text-align: center; font-size: 10px;
  border: 1px solid #ffffff50;
}

/* CONTROLS */
.controls {
  position: fixed; bottom: 40px;
  width: 100%; display: flex;
  justify-content: center; align-items: center;
  padding: 0 20px; z-index: 20;
}

.bet-bar {
  position: relative; width: 65%; max-width: 350px;
}

.bet-bar img { width: 100%; transform: scale(1.3); }

.bet-text {
  position: absolute; width: 100%; top: 50%;
  transform: translateY(-50%); text-align: center;
  color: white; font-weight: bold; font-size: 18px;
}

.spin-btn {
  margin-left: 20px; width: 110px; cursor: pointer;
}

.spin-btn img { width: 100%; transition: 0.1s; }
.spin-btn:active img { transform: scale(0.9); }

/* 🌿 JUNGLE THEME WIN OVERLAY */
#winOverlay {
  display: none; position: fixed; 
  top: 0; left: 0; width: 100%; height: 100%; 
  background: rgba(0,0,0,0.85); z-index: 9999; 
  flex-direction: column; justify-content: center; align-items: center;
}

.win-box {
  background: linear-gradient(135deg, #3d2b1f 0%, #1a0f0a 100%);
  border: 4px solid #d4af37; padding: 40px;
  border-radius: 20px; text-align: center;
  box-shadow: 0 0 50px rgba(0,0,0,0.9);
  animation: junglePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative; z-index: 10001;
}

.win-title {
  font-weight: 900; font-size: 45px;
  color: #fff; text-shadow: 0 0 15px #d4af37, 2px 2px #000;
  margin: 0; letter-spacing: 2px;
}

.win-amount {
  font-size: 35px; color: #ffd700;
  margin: 15px 0; font-weight: bold;
}

.collect-btn {
  padding: 15px 50px; font-size: 18px;
  font-family: 'Orbitron'; font-weight: bold;
  background: linear-gradient(180deg, #d4af37, #8a6d1a);
  border: none; border-radius: 10px;
  color: #fff; cursor: pointer;
  box-shadow: 0 5px 0 #4d3a0a;
}

.rays {
  position: absolute; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(212,175,55,0.2) 0%, transparent 70%);
  animation: rotateRays 8s linear infinite; z-index: 10000;
}

@keyframes rotateRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes junglePop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

.glow { 
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.9)) brightness(1.3); 
  transform: scale(1.1); transition: 0.3s; 
}
</style>
</head>
<body oncontextmenu="return false;"> 

<div class="topbar">
  <div>👤 PLAYER</div>
  <div class="coins">💰 <span id="coins">1000</span></div>
</div>

<div class="machine-container">
  <div class="machine">
    <img src="frame.png" class="frame">
    <div class="reels">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebtn">🎁 Bonus</div>
    <div class="sidebtn">500x</div>
    <div class="sidebtn">100x</div>
  </div>
</div>

<div class="controls">
  <div class="bet-bar">
    <img src="bet-bar.png">
    <div class="bet-text">BET 1</div>
  </div>
  <div class="spin-btn" id="spinBtn">
    <img src="spin-btn.png">
  </div>
</div>

<div id="winOverlay">
  <div class="rays"></div>
  <div class="win-box">
    <h1 class="win-title">BIG WIN</h1>
    <div class="win-amount" id="winLabel">+0</div>
    <button class="collect-btn" onclick="closeWin()">COLLECT</button>
  </div>
</div>

<script>
// --- JAVASCRIPT LOGIC ---
const gems = [
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/red.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/blue.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/green.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/yellow.png",
  "https://cdn.jsdelivr.net/gh/BestMovieSearchHubBot/IndiaFriendBot@main/public/gems/purple.png"
];

let coinsEl = document.getElementById("coins");
let coins = 1000;
let isSpinning = false;
let finishedReels = 0;

function createReel(id){
  let reel = document.getElementById(id);
  reel.innerHTML = "";
  let reelImages = [];
  while(reelImages.length < 15){
    let gem = gems[Math.floor(Math.random() * gems.length)];
    reelImages.push(gem);
  }
  reelImages.forEach(src => {
    let img = document.createElement("img");
    img.src = src;
    reel.appendChild(img);
  });
}

// Initial reels
createReel("r1"); createReel("r2"); createReel("r3");

function spin(){
  if(isSpinning) return;
  isSpinning = true;
  finishedReels = 0;
  spinReel("r1", 0);
  spinReel("r2", 300);
  spinReel("r3", 600);
}

function spinReel(id, delay){
  const reel = document.getElementById(id);
  const imgHeight = 85 + 18; 
  const totalHeight = imgHeight * reel.children.length;
  let start = null;
  let duration = 2500 + delay;

  function animate(timestamp){
    if(!start) start = timestamp;
    let progress = timestamp - start;
    let t = Math.min(progress / duration, 1);
    let eased = 1 - Math.pow(1 - t, 3);
    let move = eased * (totalHeight * 4);
    reel.style.transform = `translateY(${-move % totalHeight}px)`;

    if(progress < duration){
      requestAnimationFrame(animate);
    } else {
      reel.style.transform = "translateY(0)";
      createReel(id);
      finishedReels++;
      if(finishedReels === 3){
        setTimeout(checkWin, 300);
      }
    }
  }
  setTimeout(() => requestAnimationFrame(animate), delay);
}

function checkWin(){
  let reels = [document.getElementById("r1"), document.getElementById("r2"), document.getElementById("r3")];
  let totalWin = 0;
  let glowTargets = [];

  for(let row=0; row<3; row++){
    let a = reels[0].children[row], b = reels[1].children[row], c = reels[2].children[row];
    if(a.src === b.src && b.src === c.src){
      totalWin += 50; glowTargets.push(a, b, c);
    } else if(a.src === b.src || b.src === c.src || a.src === c.src){
      totalWin += 10;
      if(a.src === b.src) glowTargets.push(a, b);
      if(b.src === c.src) glowTargets.push(b, c);
      if(a.src === c.src) glowTargets.push(a, c);
    }
  }

  if(totalWin > 0){
    glowTargets.forEach(img => img.classList.add("glow"));
    setTimeout(() => showWinAnimation(totalWin), 500);
  } else {
    isSpinning = false;
  }
}

function showWinAnimation(amount) {
  const overlay = document.getElementById("winOverlay");
  const winLabel = document.getElementById("winLabel");
  winLabel.innerText = "+" + amount + " COINS";
  overlay.style.display = "flex";

  let startCoins = coins;
  coins += amount;
  let current = startCoins;
  let interval = setInterval(() => {
    if(current < coins){
      current++;
      coinsEl.innerText = current;
    } else {
      clearInterval(interval);
    }
  }, 20);
}

function closeWin() {
  document.getElementById("winOverlay").style.display = "none";
  document.querySelectorAll('.glow').forEach(el => el.classList.remove('glow'));
  isSpinning = false;
}

document.getElementById('spinBtn').onclick = spin;
</script>
</body>
</html>
